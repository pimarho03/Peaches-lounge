<!doctype html>
<html><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>bg static bake</title>
<link rel="stylesheet" href="bg.css">
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#F8F1EC}
  /* Freeze at the settled composition. NOTE: with animations cancelled,
     elements sit at their BASE styles — which in bg.css is exactly the
     settled frame: the `.pl-bg--settle` bloom animates INTO the base state
     (its final keyframe equals the un-animated styles, and the class is
     deliberately not applied here), and the drift loops are `alternate`
     oscillations AROUND the base positions. If bg.css ever changes so that
     base styles stop being the settled frame, this bake page must change
     with it. */
  .pl-bg, .pl-bg *{ animation: none !important; }
</style>
</head><body>
  <div class="pl-bg">
    <div class="pl-bg-blob b1"></div>
    <div class="pl-bg-blob b2"></div>
    <div class="pl-bg-blob b3"></div>
    <div class="pl-bg-blob b4"></div>
    <div class="pl-bg-blob b5"></div>
    <div class="pl-bg-wave"></div>
    <div class="pl-bg-grain"></div>
  </div>
</body></html>
