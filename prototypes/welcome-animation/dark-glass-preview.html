<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Peaches Lounge — dark glass welcome v2</title>
<style>
  :root{ color-scheme: dark; }
  *{margin:0;box-sizing:border-box}
  body{min-height:100vh;display:grid;place-items:center;background:#000;
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",sans-serif;padding:20px}
  .phone{position:relative;width:min(92vw,340px);aspect-ratio:9/19.5;border-radius:44px;
    background:#111;overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,.6),0 0 0 2px #222;}
  .notch{position:absolute;top:10px;left:50%;transform:translateX(-50%);width:34%;height:22px;
    background:#000;border-radius:14px;z-index:5}
  .overlay{position:absolute;inset:0;background:#111111;display:grid;place-items:center;
    animation:exit .6s ease 4.6s forwards}
  .wm{position:relative;width:62%;transform:translateY(-6%) scale(.985);
    animation:settle 2.2s cubic-bezier(.3,.2,.2,1) .8s forwards;
    filter:drop-shadow(0 0 20px rgba(240,168,134,.5));}
  /* ONE feathered sweep across the WHOLE logo */
  .wm img{width:100%;display:block;
    -webkit-mask-image:linear-gradient(90deg,#000 0 58%,transparent 66%);
    mask-image:linear-gradient(90deg,#000 0 58%,transparent 66%);
    -webkit-mask-size:200% 100%;mask-size:200% 100%;
    -webkit-mask-repeat:no-repeat;mask-repeat:no-repeat;
    -webkit-mask-position:200% 50%;mask-position:200% 50%;
    animation:sweep 2.2s cubic-bezier(.45,.05,.35,1) .8s forwards}
  .sheen{position:absolute;inset:0;-webkit-mask-image:url("glass-stacked-dark.png");
    mask-image:url("glass-stacked-dark.png");-webkit-mask-size:contain;mask-size:contain;
    -webkit-mask-repeat:no-repeat;mask-repeat:no-repeat;-webkit-mask-position:center;mask-position:center;
    pointer-events:none}
  .sheen::before{content:"";position:absolute;top:-25%;left:-40%;width:35%;height:150%;
    background:linear-gradient(100deg,transparent,rgba(255,255,255,.9),transparent);
    filter:blur(2px);transform:translateX(0) rotate(12deg);opacity:0;
    animation:sheen 1.1s ease 3.4s forwards}
  @keyframes sweep{to{-webkit-mask-position:0% 50%;mask-position:0% 50%}}
  @keyframes settle{to{transform:translateY(-6%) scale(1)}}
  @keyframes sheen{0%{opacity:0;transform:translateX(0) rotate(12deg)}
    30%{opacity:1}70%{opacity:1}100%{opacity:0;transform:translateX(560%) rotate(12deg)}}
  @keyframes exit{to{opacity:0;transform:scale(1.06)}}
  .app{position:absolute;inset:0;background:#0b0b0c;display:flex;flex-direction:column;
    padding:64px 20px 20px;gap:14px;z-index:-1}
  .app h1{color:#f2f2f2;font-size:22px;font-weight:700}
  .app .sub{color:#8a8a8a;font-size:13px;margin-top:-8px}
  .card{background:#1c1c1e;border-radius:20px;height:74px}
  .caption{position:absolute;bottom:14px;left:0;right:0;text-align:center;color:#666;font-size:12px;z-index:6}
</style></head>
<body>
  <div class="phone">
    <div class="notch"></div>
    <div class="app">
      <h1>Upcoming Classes</h1>
      <div class="sub">Tap a class to book your spot</div>
      <div class="card"></div><div class="card"></div><div class="card"></div>
    </div>
    <div class="overlay" id="o">
      <div class="wm">
        <img src="glass-stacked-dark.png" alt="">
        <div class="sheen"></div>
      </div>
    </div>
    <div class="caption">loops every ~6.5s</div>
  </div>
<script>
  setInterval(() => {
    const old = document.getElementById('o');
    const fresh = old.cloneNode(true);
    old.replaceWith(fresh);
  }, 6500);
</script>
</body></html>
